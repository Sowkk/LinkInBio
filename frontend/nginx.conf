server {
    listen 80;

    # Serve React app for all routes
    # WHY try_files with /index.html fallback?
    # React is a Single Page Application — all routes (/dashboard, /login etc)
    # are handled by React Router in the browser, not by the server
    # Without this, refreshing /dashboard gives 404 because nginx looks for a real file
    # With this, all requests serve index.html and React Router takes over
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
